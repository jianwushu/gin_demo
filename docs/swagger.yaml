basePath: /
definitions:
  dto.CreateUserRequest:
    properties:
      email:
        maxLength: 120
        type: string
      name:
        maxLength: 100
        type: string
    required:
    - email
    - name
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        maxLength: 120
        type: string
      name:
        maxLength: 100
        type: string
    required:
    - email
    - name
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: gin-demo 示例接口文档
  title: gin-demo API
  version: "1.0"
paths:
  /api/v1/users:
    get:
      description: 查询全部用户
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Body'
      summary: 查询用户列表
      tags:
      - users
    post:
      consumes:
      - application/json
      description: 创建一个新用户
      parameters:
      - description: 创建用户请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
      summary: 创建用户
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      description: 根据 ID 删除用户
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      summary: 删除用户
      tags:
      - users
    get:
      description: 根据 ID 查询用户
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      summary: 查询用户详情
      tags:
      - users
    put:
      consumes:
      - application/json
      description: 根据 ID 更新用户信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新用户请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      summary: 更新用户
      tags:
      - users
swagger: "2.0"
